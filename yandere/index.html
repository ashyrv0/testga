<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // ACCESS CHECK - MUST RUN FIRST BEFORE ANYTHING ELSE
        (function() {
            if (sessionStorage.getItem("access") !== "granted") {
                document.documentElement.innerHTML = '';
                document.body.innerHTML = '';
                document.title = "Access Denied";
                document.body.style.cssText = `
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100vh;
                    margin: 0;
                    background: #0f1115;
                    color: #e6e6eb;
                    font-family: Arial, sans-serif;
                `;
                document.body.innerHTML = `
                    <div style="text-align: center;">
                        <h1>Access Denied</h1>
                        <p>You must enter the correct access code first.</p>
                        <button onclick="window.location.href = '/';" style="
                            padding: 10px 20px;
                            background: #e6e6eb;
                            color: #0f1115;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                            font-size: 16px;
                        ">Go Back to Home</button>
                    </div>
                `;
                throw new Error('Access denied');
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandere Simulator</title>
    <style>
        html, body {
            background-color: #0f1115;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            color: #e6e6eb;
            font-family: Arial, sans-serif;
        }
        
        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0f1115;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: cursive;
            z-index: 10;
        }

        #loading-text {
            font-size: 40px;
            margin-bottom: 20px;
        }

        #loading-bar {
            width: 300px;
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #4caf50;
            transition: width 0.2s;
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div id="loading-text">LOADING...</div>
        <div id="loading-bar">
            <div id="progress"></div>
        </div>
    </div>

    <canvas id="unity-canvas" tabindex="-1" hidden></canvas>

    <script src="Build/yandere.loader.js"></script>
    <script defer src="https://cdn.vercel-analytics.com/v1/analytics.js"></script>

    <script>
        var canvas = document.querySelector("#unity-canvas");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        resolve(URL.createObjectURL(mergedBlob));
                        return;
                    }
                    fetch(fileParts[index])
                        .then(r => r.arrayBuffer())
                        .then(data => {
                            buffers.push(data);
                            fetchPart(index + 1);
                        })
                        .catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        Promise.all([
            mergeFiles(getParts("Build/yandere.data.unityweb", 1, 4)),
            mergeFiles(getParts("Build/yandere.wasm.unityweb", 1, 2))
        ]).then(([dataUrl, wasmurl]) => {

            document.querySelector("#unity-canvas").hidden = false;

            createUnityInstance(canvas, {
                dataUrl: dataUrl,
                frameworkUrl: "Build/yandere.framework.js.unityweb",
                codeUrl: wasmurl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Game Dev",
                productName: "Yandere Simulator",
                productVersion: "1.0",
            }, (progress) => {

                document.getElementById("progress").style.width = (progress * 100) + "%";

            }).then(() => {

                document.getElementById("loading-screen").style.display = "none";

            });
        });
    </script>

</body>

</html>
