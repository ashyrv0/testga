<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="icon" type="image/x-icon" href="./Images/icon.ico">
    <meta name="description" content="My portfolio">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MAIN CONTENT -->
<div class="middle">
    <div id="loginSection">
        <h2>Enter Access Code</h2>
        <input type="password" id="codeInput" placeholder="Enter Code" autocomplete="off" maxlength="20">
        <button id="submitBtn">Submit</button>
    </div>

<!-- ACCESS PAGE -->
    <div id="gameAccess" style="display:none;">
        <h3>Access Granted!</h3>
        <h1 id="welcomeText">Welcome!</h1>
        <p id="timeText"></p>

        <button onclick="openUltrakill()">ULTRAKILL</button>
        <button onclick="showKindergarten()">Kindergarten</button>
        <button onclick="openGame('./Games/Omori.html')">OMORI</button>
        <button onclick="openGame('./Games/Undertale.html')">Undertale</button>
        <button onclick="openGame('./Games/Deltarune/index.html')">Deltarune</button>
        <button onclick="openGame('./Games/hotline-miami/index.html')">Hotline Miami</button>
        <button onclick="openGame('./Games/cheese.html')">Cheese Rolling</button>
        <button onclick="openGame('./Games/osu!.html')">Osu!</button>

        <div id="kindergartenMenu" style="display:none;">
            <button onclick="openK1()">Kindergarten 1</button>
            <button onclick="openK2()">Kindergarten 2</button>
        </div>
    </div>

<!-- SETTINGS -->
    <button id="settingsBtn" class="settings-btn" style="display:none;">⚙</button>

    <div id="settingsPanel" class="settings-panel">
        <button id="closeSettings" class="close-settings">X</button>
        <h3>Settings</h3>

        <p>Panic Key</p>
        <button id="panicKeyBtn">Your key: `</button>

        <p>Redirect URL</p>
        <input id="panicUrl" placeholder="https://www.google.com" autocomplete="off">
        <button id="saveSettings">Set URL</button>

        <p>Cloak Methods</p>
        <button id="blankBtn">Open in about:blank</button>
        <button id="blobBtn">Open in blob:null</button>

        <p class="note">Opens site in new tab with no visible URL</p>
    </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup" style="display:none;" role="dialog">
    <div class="popup-box">
        <button class="close-btn" onclick="closePopup()">X</button>
        <img src="/Images/twp0jr6czfpg1.jpeg" alt="popup image" loading="lazy">
        <button id="clickBtn">Annihilate foid</button>
        <p id="infoText">Loading...</p>
    </div>
</div>

<footer>
    <p class="last-updated">Last Updated: 4/28/26 16:28</p>
    <p class="made-by">Made with 💜 <a href="https://github.com/ashyrv0" target="_blank" rel="noopener noreferrer"> Ashyr0</a> | Free Forever</p>
</footer>

<script src="script.js"></script>

</body>
</html>
