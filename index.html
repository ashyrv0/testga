    <div id="settingsPanel" class="settings-panel">
        <button id="closeSettings" class="close-settings">X</button>
        <h3>Settings</h3>

        <p>Tab Cloak</p>
    <div class="dropdown-section">
        <button id="cloakDropdownBtn" class="dropdown-btn">
                Preset Cloaks <span class="arrow">▼</span>
        </button>
            <div id="cloakDropdown" class="dropdown-content" style="display:none;">
        <button class="cloak-option" data-title="Google" data-icon="https://www.google.com/favicon.ico">
            <img src="https://www.google.com/favicon.ico" alt="" width="16" height="16">
        </button>
        <button class="cloak-option" data-title="Wikipedia" data-icon="https://www.wikipedia.org/static/favicon/wikipedia.ico">
            <img src="https://www.wikipedia.org/static/favicon/wikipedia.ico" alt="" width="16" height="16">
        </button>
        <button class="cloak-option" data-title="Google Classroom" data-icon="https://ssl.gstatic.com/classroom/ic_product_classroom_144.png">
            <img src="https://ssl.gstatic.com/classroom/ic_product_classroom_144.png" alt="" width="16" height="16">
        </button>
        <button class="cloak-option" data-title="Google Drive" data-icon="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">
            <img src="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" alt="" width="16" height="16">
        </button>
        <button class="cloak-option" data-title="Desmos" data-icon="https://www.desmos.com/favicon.ico">
            <img src="https://www.desmos.com/favicon.ico" alt="" width="16" height="16">
        </button>
        <button class="cloak-option" data-title="Khan Academy" data-icon="https://www.khanacademy.org/favicon.ico">
            <img src="https://www.khanacademy.org/favicon.ico" alt="" width="16" height="16">
        </button>
        </div>
    </div>

    <!-- Custom Cloak -->
    <div class="custom-cloak">
        <input type="text" id="customTitle" placeholder="Title" autocomplete="off">
        <input type="text" id="customIcon" placeholder="Icon URL" autocomplete="off">
    </div>

        <p>Cloak Methods</p>
        <button id="blankBtn">Open in about:blank</button>
        <button id="blobBtn">Open in blob:null</button>

        <p class="note">Opens site in new tab with no visible URL</p>

        <p>Panic Key</p>
        <button id="panicKeyBtn">Your key: `</button>

        <p>Redirect URL</p>
        <input id="panicUrl" placeholder="https://www.google.com" autocomplete="off">
        <button id="saveSettings">Set URL</button>
