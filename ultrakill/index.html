<!DOCTYPE html>
<html lang="en-us">

<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@latest/ultrakill/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | ULTRAKILL</title>

    <style>
        html,
        body {
            background-color: #0f1115;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0f1115;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: cursive;
            z-index: 10;
        }

        #loading-text {
            font-size: 40px;
            margin-bottom: 20px;
        }

        #loading-bar {
            width: 300px;
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #4caf50;
            transition: width 0.2s;
        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div id="loading-text">LOADING...</div>
        <div id="loading-bar">
            <div id="progress"></div>
        </div>
    </div>

    <canvas id="unity-canvas" tabindex="-1" hidden></canvas>

    <script src="Build/ultrakill.loader.js"></script>

    <script>
        var canvas = document.querySelector("#unity-canvas");

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);

            canvas.style.width = "100%";
            canvas.style.height = "100%";
            canvas.style.position = "fixed";
        } else {
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        resolve(URL.createObjectURL(mergedBlob));
                        return;
                    }
                    fetch(fileParts[index])
                        .then(r => r.arrayBuffer())
                        .then(data => {
                            buffers.push(data);
                            fetchPart(index + 1);
                        })
                        .catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        Promise.all([
            mergeFiles(getParts("Build/ultrakill.data.unityweb", 1, 4)),
            mergeFiles(getParts("Build/ultrakill.wasm.unityweb", 1, 2))
        ]).then(([dataUrl, wasmurl]) => {

            document.querySelector("#unity-canvas").hidden = false;

            createUnityInstance(canvas, {
                dataUrl: dataUrl,
                frameworkUrl: "Build/ultrakill.framework.js.unityweb",
                codeUrl: wasmurl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Hakita and Cake Logic",
                productName: "ULTRAKILL",
                productVersion: "1.4",
            }, (progress) => {

                // UPDATE LOADING BAR
                document.getElementById("progress").style.width = (progress * 100) + "%";

            }).then(() => {

                // REMOVE LOADING SCREEN
                document.getElementById("loading-screen").style.display = "none";

            });
        });
    </script>

</body>

</html>
